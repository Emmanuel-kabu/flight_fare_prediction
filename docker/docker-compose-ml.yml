name: flight-fare-mlops

services:
  fastapi:
    build:
      context: ..
      dockerfile: docker/Dockerfile.fastapi
    container_name: flight-fare-fastapi
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    ports:
      - "8000:8000"
    depends_on:
      - mlflow
    networks:
      - mlops

  # MLflow tracking server + model registry
  mlflow:
    build:
      context: ..
      dockerfile: docker/Dockerfile.mlflow
    container_name: flight-fare-mlflow
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql+psycopg2://mlflow:mlflow@mlflow-db:5432/mlflow
      MLFLOW_DEFAULT_ARTIFACT_ROOT: s3://mlflow/
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minio}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minio123}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      # Needed for path-style addressing against MinIO
      AWS_S3_FORCE_PATH_STYLE: "true"
    ports:
      - "5000:5000"
    depends_on:
      - mlflow-db
      - minio
      - minio-init
    networks:
      - mlops

  mlflow-db:
    image: postgres:16
    container_name: flight-fare-mlflow-db
    environment:
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow
      POSTGRES_DB: mlflow
    volumes:
      - mlflow-db-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - mlops

  # Artifact store for MLflow (S3-compatible)
  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: flight-fare-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - mlops

  minio-init:
    image: minio/mc:RELEASE.2024-11-05T11-29-45Z
    container_name: flight-fare-minio-init
    depends_on:
      - minio
    entrypoint: ["/bin/sh", "-lc"]
    command: |
      until (mc alias set local http://minio:9000 "${MINIO_ROOT_USER:-minio}" "${MINIO_ROOT_PASSWORD:-minio123}") do sleep 2; done
      mc mb -p local/mlflow || true
      mc anonymous set download local/mlflow || true
    networks:
      - mlops

  # Evidently UI for performance metrics dashboards
  evidently:
    build:
      context: ..
      dockerfile: docker/Dockerfile.evidently
    container_name: flight-fare-evidently
    ports:
      - "8001:8001"
    volumes:
      - ../performance_tracking:/workspace/performance_tracking
      - evidently-data:/workspace/evidently_data
    networks:
      - mlops

  # Airflow for orchestration (mounts your orchestration/ folder as DAGs)
  airflow-db:
    image: postgres:16
    container_name: flight-fare-airflow-db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - mlops

  airflow-init:
    image: apache/airflow:2.9.3
    container_name: flight-fare-airflow-init
    depends_on:
      - airflow-db
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_USER:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_PASSWORD:-airflow}
    user: "0:0"
    volumes:
      - ../orchestration:/opt/airflow/dags
      - airflow-logs:/opt/airflow/logs
    entrypoint: ["/bin/bash", "-lc"]
    command: |
      airflow db migrate
      airflow users create \
        --username "${AIRFLOW_USER:-airflow}" \
        --password "${AIRFLOW_PASSWORD:-airflow}" \
        --firstname Airflow \
        --lastname Admin \
        --role Admin \
        --email admin@example.com || true
    networks:
      - mlops

  airflow-webserver:
    image: apache/airflow:2.9.3
    container_name: flight-fare-airflow-webserver
    depends_on:
      - airflow-init
      - airflow-db
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    volumes:
      - ../orchestration:/opt/airflow/dags
      - airflow-logs:/opt/airflow/logs
    ports:
      - "8080:8080"
    command: webserver
    networks:
      - mlops

  airflow-scheduler:
    image: apache/airflow:2.9.3
    container_name: flight-fare-airflow-scheduler
    depends_on:
      - airflow-init
      - airflow-db
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - ../orchestration:/opt/airflow/dags
      - airflow-logs:/opt/airflow/logs
    command: scheduler
    networks:
      - mlops

networks:
  mlops:
    driver: bridge

volumes:
  mlflow-db-data:
  minio-data:
  evidently-data:
  airflow-db-data:
  airflow-logs:

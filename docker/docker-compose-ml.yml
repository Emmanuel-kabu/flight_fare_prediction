# ═══════════════════════════════════════════════════════════════════════════════
#  Flight Fare Prediction — MLOps Stack
# ═══════════════════════════════════════════════════════════════════════════════
#  Services:
#    fastapi         – prediction API             (port 8000)
#    streamlit       – web UI frontend            (port 8501)
#    mlflow          – experiment tracking / model registry (port 5000)
#    evidently       – monitoring dashboards      (port 8001)
#    airflow-*       – pipeline orchestration     (port 8080)
#    postgres (×2)   – backends for MLflow + Airflow
#    minio           – S3-compatible artifact store (ports 9000/9001)
# ═══════════════════════════════════════════════════════════════════════════════

name: flight-fare-mlops

# ── Shared Airflow config (anchor) ─────────────────────────────────────────
x-airflow-common: &airflow-common
  build:
    context: ..
    dockerfile: docker/Dockerfile.airflow
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    # ML project root inside the container
    PROJECT_ROOT: /opt/airflow/project
    # MLflow
    MLFLOW_TRACKING_URI: http://mlflow:5000
    AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minio}
    AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minio123}
    MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    AWS_S3_FORCE_PATH_STYLE: "true"
    # Slack notifications
    SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    CHANNEL_NAME: ${CHANNEL_NAME:-ml_pipeline_report}
    AIRFLOW_UI_BASE_URL: http://localhost:8082
    # FastAPI endpoint (for reload after retraining)
    FASTAPI_BASE_URL: http://fastapi:8000
  volumes:
    - ../orchestration:/opt/airflow/dags
    - ..:/opt/airflow/project
    - airflow-logs:/opt/airflow/logs
    - shared-artifacts:/opt/airflow/project/artifacts
    - shared-reports:/opt/airflow/project/reports
  networks:
    - mlops
  depends_on:
    airflow-db:
      condition: service_healthy

services:
  # ─────────────── Prediction API ──────────────────────────────────────────
  fastapi:
    build:
      context: ..
      dockerfile: docker/Dockerfile.fastapi
    container_name: flight-fare-fastapi
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    ports:
      - "8003:8000"
    volumes:
      - ../artifacts:/app/artifacts
    depends_on:
      - mlflow
    networks:
      - mlops

  # ─────────────── Streamlit Frontend ──────────────────────────────────────
  streamlit:
    build:
      context: ..
      dockerfile: docker/Dockerfile.streamlit
    container_name: flight-fare-streamlit
    environment:
      API_URL: http://fastapi:8000
    ports:
      - "8501:8501"
    depends_on:
      - fastapi
    networks:
      - mlops

  # ─────────────── MLflow Tracking Server ──────────────────────────────────
  mlflow:
    build:
      context: ..
      dockerfile: docker/Dockerfile.mlflow
    container_name: flight-fare-mlflow
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql+psycopg2://mlflow:mlflow@mlflow-db:5432/mlflow
      MLFLOW_DEFAULT_ARTIFACT_ROOT: s3://mlflow/
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minio}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minio123}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_S3_FORCE_PATH_STYLE: "true"
    ports:
      - "5000:5000"
    depends_on:
      mlflow-db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - mlops

  mlflow-db:
    image: postgres:16-alpine
    container_name: flight-fare-mlflow-db
    environment:
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow
      POSTGRES_DB: mlflow
    volumes:
      - mlflow-db-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - mlops

  # ─────────────── MinIO (S3-compatible artifact store) ────────────────────
  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: flight-fare-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - mlops

  minio-init:
    image: minio/mc:RELEASE.2024-11-05T11-29-45Z
    container_name: flight-fare-minio-init
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    entrypoint: ["/bin/sh"]
    command:
      - "-lc"
      - >
        until mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; do sleep 2; done;
        mc mb -p local/mlflow || true;
        mc anonymous set download local/mlflow || true;
    networks:
      - mlops

  # ─────────────── Evidently Monitoring Dashboard ──────────────────────────
  evidently:
    build:
      context: ..
      dockerfile: docker/Dockerfile.evidently
    container_name: flight-fare-evidently
    ports:
      - "8001:8001"
    volumes:
      - shared-reports:/workspace/reports
      - evidently-data:/workspace/evidently_data
    networks:
      - mlops

  # ─────────────── Airflow (orchestration) ─────────────────────────────────
  airflow-db:
    image: postgres:16-alpine
    container_name: flight-fare-airflow-db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - mlops

  airflow-init:
    <<: *airflow-common
    container_name: flight-fare-airflow-init
    user: "0:0"
    entrypoint: ["/bin/bash", "-c"]
    command: >
      export PATH="/home/airflow/.local/bin:$$PATH" &&
      airflow db migrate &&
      airflow users create
      --username "$${AIRFLOW_USER:-airflow}"
      --password "$${AIRFLOW_PASSWORD:-airflow}"
      --firstname Airflow
      --lastname Admin
      --role Admin
      --email admin@example.com || true

  airflow-webserver:
    <<: *airflow-common
    container_name: flight-fare-airflow-webserver
    ports:
      - "8082:8080"
    command: webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: flight-fare-airflow-scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      mlflow:
        condition: service_started
      minio:
        condition: service_started

networks:
  mlops:
    driver: bridge

volumes:
  mlflow-db-data:
  minio-data:
  evidently-data:
  airflow-db-data:
  airflow-logs:
  shared-artifacts:
  shared-reports:

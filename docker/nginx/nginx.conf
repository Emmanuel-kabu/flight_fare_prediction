# ═══════════════════════════════════════════════════════════════════════════════
#  Nginx Load Balancer for Flight Fare Prediction API
# ═══════════════════════════════════════════════════════════════════════════════
#  - Round-robin across FastAPI replicas (fastapi-1, fastapi-2, fastapi-3)
#  - Passive health checks: marks a replica down after 3 failures
#  - Transparent proxy headers (X-Real-IP, X-Forwarded-For)
#  - WebSocket-ready upgrade headers
#  - Connection keepalive to upstream for performance
# ═══════════════════════════════════════════════════════════════════════════════

upstream fastapi_backend {
    # Docker Compose replicas — resolved via Docker DNS
    # Each member inherits the default weight=1 (round-robin)
    server fastapi-1:8000 max_fails=3 fail_timeout=30s;
    server fastapi-2:8000 max_fails=3 fail_timeout=30s;
    server fastapi-3:8000 max_fails=3 fail_timeout=30s;

    # Keep persistent connections to upstream for lower latency
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # ── Logging ────────────────────────────────────────────────────────────
    access_log /var/log/nginx/api_access.log;
    error_log  /var/log/nginx/api_error.log warn;

    # ── Client limits ──────────────────────────────────────────────────────
    client_max_body_size 10M;

    # ── Health check endpoint for the LB itself ────────────────────────────
    location /lb-health {
        access_log off;
        return 200 '{"status":"ok","service":"nginx-lb"}';
        add_header Content-Type application/json;
    }

    # ── Proxy pass to FastAPI backend ──────────────────────────────────────
    location / {
        proxy_pass http://fastapi_backend;

        # Standard proxy headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket / upgrade support
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Keepalive to upstream
        proxy_http_version 1.1;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    60s;

        # Retry on failure — try next upstream if current is down
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
    }
}
